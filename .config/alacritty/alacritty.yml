window:
  opacity: 0.8

  dynamic_padding: false
  decorations: None
  
  class:
      instance: Alacritty
      general: Alacritty

  scrolling:
      history: 10000
      multiplier: 3


live_config_reload: true

font:
    normal:
      family: "FiraMono Nerd Font Mono"
      style: Regular
    bold:
      family: "FiraMono Nerd Font Mono"
      style: Bold
    italic:
      family: "FiraMono Nerd Font Mono"
      style:  Italic
    bold_italic:
      family: "FiraMono Nerd Font Mono"
      style: Bold Italic

    size: 15.0 


import:
  - ~/.config/alacritty/catppuccin-mocha.yml

shell:
  program: /usr/bin/fish
